name: Build Executable

on:
  push:
    branches: [ "main" ]  # main 브랜치에 코드가 올라올 때 실행
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # 윈도우 실행 파일을 위해 윈도우 환경에서 빌드

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyautogui pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --onefile: 파일 하나로 합침
        # --noconsole: 실행 시 까만 창(터미널) 안 뜨게 함
        pyinstaller --onefile --noconsole main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GridClicker-Windows
        path: dist/main.exe
