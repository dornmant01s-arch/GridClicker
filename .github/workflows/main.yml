name: Build Executable

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    # 노드 관련 경고를 미리 해결하기 위해 환경 변수 설정 (선택 사항)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # v4는 Node 20/24를 지원하므로 유지해도 무방하나 최신 유지

    - name: Set up Python
      uses: actions/setup-python@v5 # v4에서 v5로 업데이트
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pyautogui pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --noconsole main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # v4는 최신 방식이므로 유지
      with:
        name: GridClicker-Windows
        path: dist/main.exe
